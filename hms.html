
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">
    <style>
       
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            
            cursor: none;
        }

     
        .title-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            /* Pointer events none so the mouse doesn't interact with the text */
            pointer-events: none;
        }

        h1 {
            color: #ffffff;
            font-size: clamp(3rem, 6vw, 6rem);
            margin: 0;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            white-space: nowrap;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4), 0 0 40px rgba(255, 255, 255, 0.1);
        }

        .subtitle {
            color: #888;
            font-size: 1.2rem;
            letter-spacing: 0.4em;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: 400;
        }

        }
    </style>
</head>
<body>
    
    <div class="title-container">
        <h1>Infinity Games</h1>
        <div class="subtitle">is this tuff</div>
    </div>

    

<script src="https://latte-x.neocities.org/pilly.js"></script>
</body>
</html>
